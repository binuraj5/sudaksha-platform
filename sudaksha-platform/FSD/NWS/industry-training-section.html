  domain: 'Domain-Specific',
  technology: 'Technology',
  behavioural: 'Behavioural',
  cognitive: 'Cognitive',
  specialist: 'Specialist'
};

let activeIndustry = 'fintech';
let activeCategory = 'domain';

function getIndustry(id) {
  return INDUSTRIES.find(i => i.id === id);
}

function renderIndustryRail() {
  const rail = document.getElementById('industryRail');
  rail.innerHTML = INDUSTRIES.map(ind => `
    <button class="ind-pill ${ind.id === activeIndustry ? 'active' : ''}" onclick="selectIndustry('${ind.id}')">
      <span class="pill-icon">${ind.icon}</span>${ind.label}
    </button>
  `).join('');
}

function renderIndustryHero() {
  const ind = getIndustry(activeIndustry);
  document.getElementById('industryHero').innerHTML = `
    <div class="hero-left">
      <div class="hero-icon">${ind.icon}</div>
      <div>
        <div class="hero-name">${ind.label}</div>
        <div class="hero-tag">${ind.tagline}</div>
      </div>
    </div>
    <div class="hero-stats">
      <div>
        <div class="hero-stat-num">${ind.stats.programs}+</div>
        <div class="hero-stat-label">Programs Available</div>
      </div>
      <div>
        <div class="hero-stat-num">5</div>
        <div class="hero-stat-label">Training Categories</div>
      </div>
    </div>
  `;
}

function renderCatTabs() {
  document.getElementById('catTabs').innerHTML = Object.entries(CATEGORY_LABELS).map(([key, label]) => {
    const ind = getIndustry(activeIndustry);
    const count = ind.categories[key].length;
    return `<button class="cat-tab ${key === activeCategory ? 'active' : ''}" onclick="selectCategory('${key}')">
      ${label}<span class="count-badge">${count}</span>
    </button>`;
  }).join('');
}

function renderPrograms() {
  const ind = getIndustry(activeIndustry);
  const programs = ind.categories[activeCategory];
  const grid = document.getElementById('programGrid');
  grid.className = 'program-grid fade-in';
  grid.innerHTML = programs.map(prog => `
    <div class="program-card">
      <div class="prog-name">${prog}</div>
      <div class="prog-enquire">Enquire →</div>
    </div>
  `).join('');
}

function renderDemandPanel() {
  const ind = getIndustry(activeIndustry);
  document.getElementById('demandPanel').innerHTML = `
    <div class="demand-header">
      <span class="demand-badge">🔥 High Demand</span>
    </div>
    <div class="demand-title">Solutions in Demand</div>
    ${ind.demand.map(d => `
      <div class="demand-item">
        <div class="demand-dot"></div>
        <div>
          <div class="demand-prog-name">${d.name}</div>
          <div class="demand-prog-tag">${d.tag}</div>
        </div>
      </div>
    `).join('')}
  `;
}

function renderCTA() {
  const ind = getIndustry(activeIndustry);
  document.getElementById('ctaBar').innerHTML = `
    <div class="cta-text-group">
      <div class="cta-label">Ready to start?</div>
      <div class="cta-headline">Design Your ${ind.label} Training Program</div>
    </div>
    <button class="cta-btn">Schedule Discovery Call →</button>
  `;
}

function selectIndustry(id) {
  activeIndustry = id;
  activeCategory = 'domain';
  renderAll();
}

function selectCategory(key) {
  activeCategory = key;
  renderCatTabs();
  renderPrograms();
}

function renderAll() {
  renderIndustryRail();
  renderIndustryHero();
  renderCatTabs();
  renderPrograms();
  renderDemandPanel();
  renderCTA();
}

renderAll();
