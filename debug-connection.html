<!DOCTYPE html>
<html>
<head>
    <title>AI Service Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .test-btn { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; margin: 10px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <h1>AI Service Connection Test</h1>
    
    <button class="test-btn" onclick="testHealth()">Test Health Endpoint</button>
    <button class="test-btn" onclick="testCORS()">Test CORS</button>
    <button class="test-btn" onclick="testAI()">Test AI Generation</button>
    
    <div id="results"></div>

    <script>
        async function testHealth() {
            try {
                const response = await fetch('http://127.0.0.1:8000/health');
                const data = await response.json();
                showResult('Health Test', `✅ Success: ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                showResult('Health Test', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function testCORS() {
            try {
                const response = await fetch('http://127.0.0.1:8000/test');
                const data = await response.json();
                showResult('CORS Test', `✅ Success: ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                showResult('CORS Test', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function testAI() {
            try {
                const response = await fetch('http://127.0.0.1:8000/generate-course', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        topic: 'Test Course',
                        industry: 'software',
                        target_audience: 'beginner',
                        context_prompt: 'Browser test'
                    })
                });
                const data = await response.json();
                showResult('AI Generation Test', `✅ Success: Generated "${data.name}"`, 'success');
            } catch (error) {
                showResult('AI Generation Test', `❌ Error: ${error.message}`, 'error');
            }
        }

        function showResult(test, message, type) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${test}:</strong> ${message}`;
            results.appendChild(div);
        }
    </script>
</body>
</html>
