# Sudaksha Assessment - Python Backend + PostgreSQL
# Run Next.js separately: npm run dev
# Set PYTHON_API_URL=http://localhost:8000 in .env
version: "3.8"

services:
  fastapi:
    build: ./python-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PISTON_API_URL=${PISTON_API_URL:-https://emkc.org/api/v2/piston}
    volumes:
      - ./uploads:/app/uploads

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=sudaksha
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
